<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能駕駛學院 - 自動循線中控台</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        h3 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .btn { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 6px; background-color: #e0e0e0; transition: 0.2s; font-weight: bold; }
        .btn:hover { background-color: #d0d0d0; }
        .btn.active { background-color: #f39c12; color: white; }
        .btn-move { width: 60px; height: 40px; }
        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 200px; margin: 0 auto; text-align: center; }
        .control-grid > :nth-child(1) { grid-column: 2; }
        .control-grid > :nth-child(2) { grid-column: 1; }
        .control-grid > :nth-child(3) { grid-column: 2; }
        .control-grid > :nth-child(4) { grid-column: 3; }
        .control-grid > :nth-child(5) { grid-column: 2; }
        .param-group { margin-bottom: 15px; }
        .param-group label { display: inline-block; width: 120px; }
        input[type="number"] { width: 70px; padding: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 AI 智能駕駛中控台</h1>
    </div>

    <div class="container">
        <div class="card">
            <h3>1. 即時影像與物件辨識</h3>
            <img src="{{ url_for('video_feed') }}" width="100%" style="border-radius: 8px; background: #000;">
        </div>

        <div class="card">
            <h3>2. 鏡頭角度控制 (Servo)</h3>
            <div class="control-grid">
                <button class="btn btn-move" onclick="controlServo('up')">↑</button>
                <button class="btn btn-move" onclick="controlServo('left')">←</button>
                <button class="btn btn-move" onclick="controlServo('home')">🏠</button>
                <button class="btn btn-move" onclick="controlServo('right')">→</button>
                <button class="btn btn-move" onclick="controlServo('down')">↓</button>
            </div>
        </div>

        <div class="card">
            <h3>3. 駕駛模式與移動控制</h3>
            <div style="text-align: center; margin-bottom: 20px;">
                <button onclick="setParam('mode', 'manual')" id="btn-manual" class="btn active">手動模式</button>
                <button onclick="setParam('mode', 'auto')" id="btn-auto" class="btn">自動循線</button>
            </div>
            <div class="control-grid">
                <button class="btn btn-move" onclick="move('forward')">前進</button>
                <button class="btn btn-move" onclick="move('left')">左轉</button>
                <button class="btn btn-move" onclick="move('stop')">停止</button>
                <button class="btn btn-move" onclick="move('right')">右轉</button>
                <button class="btn btn-move" onclick="move('reverse')">後退</button>
            </div>
        </div>

        <div class="card">
            <h3>4. 自動循線參數 (PID)</h3>
            <div class="param-group">
                <label>基礎速度: </label>
                <input type="range" min="15" max="100" value="25" onchange="setParam('speed', this.value)">
                <span id="speed-val">25</span>
            </div>
            <div class="param-group">
                <label>Kp (靈敏度): </label>
                <input type="number" step="0.05" value="0.15" onchange="setParam('kp', this.value)">
            </div>
            <div class="param-group">
                <label>Kd (阻尼度): </label>
                <input type="number" step="0.01" value="0.25" onchange="setParam('kd', this.value)">
            </div>
            <div class="param-group">
                <label>Ki (積分): </label>
                <input type="number" step="0.01" value="0.00" onchange="setParam('ki', this.value)">
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
